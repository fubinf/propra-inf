name: Maintainer-ProgramChecker-Multicontainer

on:
  schedule:
    - cron: '0 4 * * 0'
  workflow_dispatch:

jobs:
  check-example-programs:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - container: debian:bookworm
            python_pkg: python3.11
            python_bin: python3.11
            artifact_id: debian-bookworm
          - container: debian:trixie
            python_pkg: python3.13
            python_bin: python3.13
            artifact_id: debian-trixie
          - container: ubuntu:24.04
            python_pkg: python3.12
            python_bin: python3.12
            artifact_id: ubuntu-24.04
    container: ${{ matrix.container }}
    env:
      SEDRILA_TITLE: "ProPra"
      SEDRILA_NAME: "propra-inf"
      SEDRILA_STARTDATE: "2026-01-01"
      SEDRILA_ENDDATE: "2026-12-31"
      SEDRILA_PARTICIPANTS_FILE: "/dev/null"

    steps:
    - name: Install system dependencies
      run: |
        apt-get update -qq
        apt-get install -y -qq \
          bash git curl ca-certificates jq \
          nodejs npm \
          ${{ matrix.python_pkg }} ${{ matrix.python_pkg }}-venv ${{ matrix.python_pkg }}-dev > /dev/null
        ln -sf /usr/bin/${{ matrix.python_bin }} /usr/bin/python

    - name: Checkout propra-inf repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        token: ${{ secrets.SUBMODULE_TOKEN }}

    - name: Checkout sedrila repository
      uses: actions/checkout@v4
      with:
        repository: fubinf/sedrila
        path: sedrila

    - name: Create and activate Python virtual environment
      shell: bash
      run: |
        python -m venv /tmp/sedrila_venv
        source /tmp/sedrila_venv/bin/activate
        python -m pip install -q --upgrade pip
        cd sedrila && pip install -q -e . && cd ..

    - name: Collect metadata
      shell: bash
      run: |
        source /tmp/sedrila_venv/bin/activate
        python sedrila/py/sedrila.py maintainer collect-dependencies -o /tmp/metadata.json 2>/dev/null || echo '{"lang": [], "deps": [], "tasks": {}}' > /tmp/metadata.json
        echo "Lang: $(jq -r '.lang | length' /tmp/metadata.json) commands, Deps: $(jq -r '.deps | length' /tmp/metadata.json) commands, Tasks: $(jq -r '.tasks | length' /tmp/metadata.json)"

    - name: Install language runtimes and task dependencies globally
      shell: bash
      run: |
        set -e
        source /tmp/sedrila_venv/bin/activate

        echo "=== Installing Language Runtimes ==="
        LANG_CMDS=$(jq -r '.lang[]?' /tmp/metadata.json 2>/dev/null)
        if [ -z "$LANG_CMDS" ] || [ "$LANG_CMDS" = "null" ]; then
          echo "[No language runtimes to install]"
        else
          while IFS= read -r cmd; do
            if [ ! -z "$cmd" ]; then
              echo "Executing: $cmd"
              eval "$cmd" || true
            fi
          done <<< "$LANG_CMDS"
        fi

        echo ""
        echo "=== Installing Task-Specific Dependencies ==="
        DEPS_CMDS=$(jq -r '.deps[]?' /tmp/metadata.json 2>/dev/null)
        if [ -z "$DEPS_CMDS" ] || [ "$DEPS_CMDS" = "null" ]; then
          echo "[No dependencies to install]"
        else
          while IFS= read -r cmd; do
            if [ ! -z "$cmd" ]; then
              echo "Executing: $cmd"
              eval "$cmd" || true
            fi
          done <<< "$DEPS_CMDS"
        fi

        echo ""
        echo "All language runtimes and dependencies installed successfully"

    - name: Run program checks
      shell: bash
      run: |
        source /tmp/sedrila_venv/bin/activate
        python sedrila/py/sedrila.py maintainer check-programs \
          --batch \
          /tmp/progcheck
      continue-on-error: false

    - name: Upload program check reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: program-check-reports-${{ matrix.artifact_id }}
        path: /tmp/progcheck_i/program_test_report.md
        retention-days: 90

  merge-reports:
    runs-on: ubuntu-latest
    needs: check-example-programs
    if: always()

    steps:
    - name: Download all reports
      uses: actions/download-artifact@v4
      with:
        pattern: program-check-reports-*
        path: /tmp/artifacts

    - name: Merge reports and publish summary
      run: |
        python3 << 'EOF'
        import re, os

        ENVIRONMENTS = [
            ("debian:bookworm", "python3.11", "debian-bookworm"),
            ("debian:trixie",   "python3.13", "debian-trixie"),
            ("ubuntu:24.04",    "python3.12", "ubuntu-24.04"),
        ]

        def parse_block_stats(text):
            """Parse stats from the Block-Level Statistics section only."""
            m = re.search(r'### Block-Level Statistics\n(.*?)(?=\n###|\n##|\Z)', text, re.DOTALL)
            if not m:
                return {}
            section = m.group(1)
            result = {}
            for label, key in [
                ("Total @PROT_SPEC blocks", "total"),
                ("Passed",  "passed"),
                ("Failed",  "failed"),
                ("Manual",  "manual"),
                ("Skip",    "skip"),
            ]:
                mm = re.search(rf'\*\*{re.escape(label)}:\*\* (\d+)', section)
                result[key] = int(mm.group(1)) if mm else 0
            return result

        def extract_section(text, heading):
            """Return the content between '## heading' and the next '## ' heading."""
            pattern = rf'## {re.escape(heading)}\n(.*?)(?=\n## |\Z)'
            m = re.search(pattern, text, re.DOTALL)
            return m.group(1).strip() if m else ""

        reports = {}
        for container, python_ver, artifact_id in ENVIRONMENTS:
            path = f"/tmp/artifacts/program-check-reports-{artifact_id}/program_test_report.md"
            if os.path.exists(path):
                with open(path) as f:
                    reports[artifact_id] = (container, python_ver, f.read())
            else:
                reports[artifact_id] = (container, python_ver, None)

        out = []
        out.append("# Program Check Report\n\n")

        # --- Environment summary table ---
        out.append("## Environment Summary\n\n")
        out.append("| Environment | Python | Blocks total | Failed | Manual | Skip | Passed |\n")
        out.append("|-------------|--------|-------------:|-------:|-------:|-----:|-------:|\n")
        for artifact_id, (container, python_ver, text) in reports.items():
            if text is None:
                out.append(f"| `{container}` | {python_ver} | — | — | — | — | *(no report)* |\n")
                continue
            s = parse_block_stats(text)
            status = "FAIL" if s.get("failed", 0) > 0 else "ok"
            out.append(
                f"| [{status}] `{container}` | {python_ver}"
                f" | {s.get('total', 0)}"
                f" | {s.get('failed', 0)}"
                f" | {s.get('manual', 0)}"
                f" | {s.get('skip', 0)}"
                f" | {s.get('passed', 0)} |\n"
            )
        out.append("\n")

        # --- Failed tests (all environments) ---
        has_failures_section = False
        for artifact_id, (container, python_ver, text) in reports.items():
            if not text:
                continue
            failed_table  = extract_section(text, "Failed Tests")
            failed_detail = extract_section(text, "Failed Tests Detail")
            if not failed_table and not failed_detail:
                continue
            if not has_failures_section:
                out.append("## Failed Tests (All Environments)\n\n")
                has_failures_section = True
            out.append(f"### `{container}` ({python_ver})\n\n")
            if failed_table:
                out.append(failed_table + "\n\n")
            if failed_detail:
                out.append("#### Detail\n\n")
                out.append(failed_detail + "\n\n")

        if not has_failures_section:
            out.append("## Failed Tests\n\n*No failures across all environments.*\n\n")

        def normalize_for_compare(content):
            """Strip execution times so they don't cause false inequality."""
            return re.sub(r'\d+\.\d+s', 'Xs', content)

        def append_section_deduped(heading, section_name):
            """Append a section; if all environments have identical content, show only once."""
            entries = []
            for artifact_id, (container, python_ver, text) in reports.items():
                if not text:
                    continue
                content = extract_section(text, section_name)
                if content:
                    entries.append((container, python_ver, content))
            if not entries:
                return
            out.append(f"## {heading}\n\n")
            all_identical = len(set(normalize_for_compare(c) for _, _, c in entries)) == 1
            if all_identical:
                out.append("*(identical across all environments)*\n\n")
                out.append(entries[0][2] + "\n\n")
            else:
                for container, python_ver, content in entries:
                    out.append(f"### `{container}` ({python_ver})\n\n")
                    out.append(content + "\n\n")

        # --- Manual tests (all environments) ---
        append_section_deduped("Manual Tests", "Manual Tests")

        # --- Passed tests (all environments) ---
        append_section_deduped("Passed Tests", "Passed Tests")

        merged = "".join(out)

        summary_path = os.environ.get("GITHUB_STEP_SUMMARY", "/tmp/merged_report.md")
        with open(summary_path, "w") as f:
            f.write(merged)

        with open("/tmp/merged_report.md", "w") as f:
            f.write(merged)

        print("Merged report written.")
        EOF

    - name: Upload merged report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: program-check-reports-merged
        path: /tmp/merged_report.md
        retention-days: 90
